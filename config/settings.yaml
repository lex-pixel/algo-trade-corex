# =============================================
# ALGO TRADE CODEX — Ana Konfigurasyon
# =============================================

# --- GENEL AYARLAR ---
general:
  symbol: "BTC/USDT"        # Islem cifti
  timeframe: "1h"           # Mum zaman dilimi: 1m, 5m, 15m, 1h, 4h, 1d
  exchange: "binance"       # binance | bybit
  testnet: true             # true = sahte para, false = gercek para (DIKKAT!)
  dry_run: true             # true = sinyal uret ama emir gonderme (paper trading)

# --- STRATEJILER ---
strategies:

  rsi:
    enabled: true
    rsi_period: 14          # RSI hesaplama periyodu (standart: 14)
    oversold: 35            # Bu degerin alti -> AL sinyali bolgesi
    overbought: 65          # Bu degerin ustu -> SAT sinyali bolgesi
    stop_pct: 0.015         # Stop-loss yuzdesi: %1.5
    tp_pct: 0.030           # Take-profit yuzdesi: %3.0
    min_confidence: 0.05    # Bu guven skorunun altindaki sinyaller isleme alinmaz

  pa_range:
    enabled: true
    lookback: 50            # Destek/direnc icin kac mum geriye bakilir
    rsi_period: 14          # RSI periyodu
    rsi_oversold: 40        # Bu degerin alti -> destege yakinken AL
    rsi_overbought: 60      # Bu degerin ustu -> direncle yakinken SAT
    proximity_pct: 0.02     # Desteye/direncle %2 yakinlik esigi
    stop_pct: 0.015         # Stop-loss %1.5
    tp_pct: 0.030           # Take-profit %3.0
    min_confidence: 0.05    # Minimum guven skoru
    use_regime_filter: true # ADX > 25 trend piyasada sinyali durdur
    volume_confirm_mult: 1.5  # Hacim onaylama: cari hacim bu kat ortalama uzerinde olmali
    fakeout_filter: true      # Kapanisa gore kilrim dogrulama (fakeout engelle)
    rsi_divergence: true      # RSI uyumsuzlugu tespiti (ekstra guven bonusu)

# --- RISK YONETIMI ---
risk:
  max_position_risk: 0.02   # Pozisyon basina max sermaye riski: %2
  max_daily_loss: 0.05      # Gunluk max kayip (Kill Switch L2): %5
  max_drawdown: 0.15        # Max drawdown (Kill Switch L3): %15
  max_open_positions: 2     # Ayni anda max acik pozisyon: 2 (LONG + SHORT ayni anda)

# --- TRAILING STOP ---
trailing_stop:
  enabled: true
  breakeven_pct: 0.015      # %1.5 karda SL entry'ye cek (breakeven)
  partial_close_pct: 0.030  # %3 karda pozisyonun yarisini kapat
  trail_sl_pct: 0.015       # Kalan yarinin SL mesafesi (entry + %1.5)

# --- VERI AYARLARI ---
data:
  history_days: 90          # Kac gunluk gecmis veri cekilsin
  cache_size: 500           # Redis'te kac mum onbelleklensin
  parquet_dir: "data/raw"   # Ham veri kayit klasoru

# --- MTF (Multi-Timeframe) AYARLARI ---
mtf:
  penalty_pct: 0.30           # 4h kontra-trend: guven bu oranda dusurulur (0.30 = -%30)
  entry_15m_overbought: 78    # 15m RSI bu degerin ustunde ise AL engellenir
  entry_15m_oversold: 22      # 15m RSI bu degerin altinda ise SAT engellenir
  retrain_every: 720          # Her kac tick'te bir ML modeli yeniden egitilir (~30 gun)

# --- LOG ---
logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
