# =============================================
# ALGO TRADE CODEX — Ana Konfigürasyon
#
# Bu dosyayı değiştirerek kodu hiç açmadan
# tüm strateji parametrelerini yönetebilirsin.
# =============================================

# --- GENEL AYARLAR ---
general:
  symbol: "BTC/USDT"        # İşlem çifti (şimdilik tek parite)
  timeframe: "1h"           # Mum zaman dilimi: 1m, 5m, 15m, 1h, 4h, 1d
  exchange: "binance"       # binance | bybit
  testnet: true             # true = sahte para, false = gerçek para (DİKKAT!)
  dry_run: true             # true = sinyal üret ama emir gönderme (paper trading)

# --- STRATEJİLER ---
strategies:

  rsi:
    enabled: true
    rsi_period: 14          # RSI hesaplama periyodu (standart: 14)
    oversold: 30            # Bu değerin altı → AL sinyali bölgesi
    overbought: 70          # Bu değerin üstü → SAT sinyali bölgesi
    stop_pct: 0.015         # Stop-loss yüzdesi: %1.5
    tp_pct: 0.030           # Take-profit yüzdesi: %3.0
    min_confidence: 0.05    # Bu güven skorunun altındaki sinyaller işleme alınmaz

  pa_range:
    enabled: true
    lookback: 50            # Destek/direnç için kaç mum geriye bakılır
    rsi_period: 14          # RSI periyodu
    rsi_oversold: 40        # Bu değerin altı → desteğe yakınken AL
    rsi_overbought: 60      # Bu değerin üstü → dirence yakınken SAT
    proximity_pct: 0.02     # Desteğe/dirence %2 yakınlık eşiği
    stop_pct: 0.015         # Stop-loss %1.5
    tp_pct: 0.030           # Take-profit %3.0
    min_confidence: 0.05    # Minimum güven skoru
    use_regime_filter: true # ADX > 25 trend piyasada sinyali durdur

# --- RİSK YÖNETİMİ ---
risk:
  max_position_risk: 0.02   # Pozisyon başına max sermaye riski: %2
  max_daily_loss: 0.05      # Günlük max kayıp (Kill Switch L2): %5
  max_drawdown: 0.15        # Max drawdown (Kill Switch L3): %15
  max_open_positions: 1     # Aynı anda max açık pozisyon (şimdilik 1)

# --- VERİ AYARLARI ---
data:
  history_days: 90          # Kaç günlük geçmiş veri çekilsin
  cache_size: 500           # Redis'te kaç mum önbelleklensin
  parquet_dir: "data/raw"   # Ham veri kayıt klasörü

# --- LOG ---
logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
